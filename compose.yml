services:
  
  smartnewstracker-api:
    image: kauanmocelin/smartnewstracker
    build: ..
    env_file:
      - .env
    ports:
      - 8080:8080
    depends_on:
      - postgres_db
      - maildev
    networks:
      - app_network
  
  postgres_db:
    image: postgres:15.10
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=smartnewstracker
    ports:
      - "5432:5432"
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app_network
  
  maildev:
    image: maildev/maildev
    ports:
      - "1080:1080"
      - "1025:1025"
    restart: always

networks:
  app_network:

volumes:
  postgres-data: